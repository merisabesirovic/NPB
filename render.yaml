services:
  - type: web
    name: ride-mate-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    autoDeployTrigger: commit
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ApplyMigrationsOnStartup
        value: true
      - key: RIDE_MATE_CONNECTION
        sync: false
      - key: CLOUDINARY_URL
        sync: false
      - key: Jwt__Key
        generateValue: true
      - key: Jwt__Issuer
        value: RideMateApi
      - key: Jwt__Audience
        value: RideMateApiClients
      - key: Jwt__AccessTokenMinutes
        value: 60
      - key: Jwt__RefreshTokenDays
        value: 30
      - key: FrontendUrl
        sync: false

  - type: web
    name: ride-mate-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
